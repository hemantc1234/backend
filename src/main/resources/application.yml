server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/securenow_helpdesk?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # SMTP — for SENDING replies and acknowledgements to customers
  mail:
    host: smtp.office365.com
    port: 587
    username: supporttesting@securenow.in
    password: xrrqchbwmmmszddp
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

  task:
    execution:
      pool:
        core-size: 4
        max-size: 10
        queue-capacity: 100
      thread-name-prefix: securenow-async-

app:
  jwt:
    secret: ${JWT_SECRET:securenow-helpdesk-secret-key-change-in-production-min-256-bits}
    expiration-ms: 86400000

